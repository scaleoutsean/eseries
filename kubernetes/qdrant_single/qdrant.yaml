apiVersion: v1
kind: Namespace
metadata:
  name: qdrant
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qdrant-config
  namespace: qdrant
data:
  # The actual contents will be placed here or applied via deploy script
  local.yaml: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc-logs
  namespace: qdrant
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: qdrant-sc
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc-snapshots
  namespace: qdrant
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: qdrant-sc
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc-snapshots-temp
  namespace: qdrant
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: qdrant-sc
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc-storage
  namespace: qdrant
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: qdrant-sc
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc-audit
  namespace: qdrant
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: qdrant-sc
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: qdrant
spec:
  type: NodePort
  ports:
    - name: http
      port: 6333
      targetPort: 6333
      nodePort: 30333
    - name: grpc
      port: 6334
      targetPort: 6334
      nodePort: 30334
  selector:
    app: qdrant
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: qdrant
  labels:
    app: qdrant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          imagePullPolicy: IfNotPresent
          command: ["./qdrant", "--config-path", "/config/local.yaml"]
          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334
          volumeMounts:
            - name: config
              mountPath: /config
            - name: logs
              mountPath: /qdrant/logs
            - name: snapshots
              mountPath: /qdrant/snapshots
            - name: snapshots-temp
              mountPath: /qdrant/snapshots_temp
            - name: storage
              mountPath: /qdrant/storage
            - name: audit
              mountPath: /qdrant/audit
      volumes:
        - name: config
          configMap:
            name: qdrant-config
        - name: logs
          persistentVolumeClaim:
            claimName: qdrant-pvc-logs
        - name: snapshots
          persistentVolumeClaim:
            claimName: qdrant-pvc-snapshots
        - name: snapshots-temp
          persistentVolumeClaim:
            claimName: qdrant-pvc-snapshots-temp
        - name: storage
          persistentVolumeClaim:
            claimName: qdrant-pvc-storage
        - name: audit
          persistentVolumeClaim:
            claimName: qdrant-pvc-audit
